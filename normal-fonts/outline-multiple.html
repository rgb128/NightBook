<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Font Comparison Tool</title>
    <!-- Load opentype.js library from a CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/opentype.js/1.3.4/opentype.min.js"></script>
    <style>
        body {
            font-family: sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .controls-container {
            width: 100%;
            max-width: 900px;
            background-color: #2b2b2b;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
            margin-bottom: 30px;
        }
        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            align-items: center;
        }
        .control-item {
            display: flex;
            flex-direction: column;
        }
        label {
            font-weight: bold;
            margin-bottom: 5px;
        }
        input[type="text"],
        input[type="number"],
        input[type="file"] {
            width: 100%;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #555555;
            background-color: #333333;
            color: #ffffff;
        }
        input[type="color"] {
            width: 100%;
            height: 40px;
            border: none;
            padding: 0;
            border-radius: 5px;
            cursor: pointer;
        }
        #previews-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 30px;
            width: 100%;
        }
        .preview-wrapper {
            background-color: #2b2b2b;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0,0,0,0.4);
        }
        .preview-wrapper h3 {
            margin-top: 0;
            margin-bottom: 15px;
            color: #00aaff;
            word-break: break-all;
        }
        .preview-wrapper canvas {
            display: block;
            background-color: #000;
            max-width: 100%;
            height: auto;
            border-radius: 5px;
        }
        .preview-wrapper button {
             padding: 10px 20px;
            border: none;
            border-radius: 5px;
            background-color: #007bff;
            color: #ffffff;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
            margin-top: 15px;
        }
        .preview-wrapper button:hover {
            background-color: #0056b3;
        }
        #initial-message {
            color: #777;
            font-size: 1.2em;
        }
    </style>
</head>
<body>

    <div class="controls-container">
        <div class="controls">
            <div class="control-item">
                <label for="text-input">Text:</label>
                <input type="text" id="text-input" value="#808080">
            </div>
            <div class="control-item">
                <label for="color-picker">Color:</label>
                <input type="color" id="color-picker" value="#ff00ff">
            </div>
            <div class="control-item">
                <label for="font-size-input">Font Size:</label>
                <input type="number" id="font-size-input" value="500">
            </div>
            <div class="control-item">
                <label for="line-width-input">Tube Width:</label>
                <input type="number" id="line-width-input" value="8" min="1" max="20">
            </div>
            <div class="control-item" style="grid-column: 1 / -1;">
                <label for="font-file-input">Upload Fonts:</label>
                <input type="file" id="font-file-input" accept=".ttf, .otf, .woff, .woff2" multiple>
            </div>
        </div>
    </div>

    <div id="previews-container">
        <p id="initial-message">Upload one or more font files to see the previews.</p>
    </div>

    <script>
        // --- Canvas and Wallpaper Settings ---
        const CANVAS_WIDTH = 2560;
        const CANVAS_HEIGHT = 1680;

        // --- Element References ---
        const textInput = document.getElementById('text-input');
        const colorPicker = document.getElementById('color-picker');
        const fontSizeInput = document.getElementById('font-size-input');
        const lineWidthInput = document.getElementById('line-width-input');
        const fontFileInput = document.getElementById('font-file-input');
        const previewsContainer = document.getElementById('previews-container');
        
        let loadedFonts = [];

        // --- Utility to lighten a hex color ---
        function lightenColor(hex, percent) {
            hex = hex.replace(/^#/, '');
            const r = parseInt(hex.substring(0, 2), 16);
            const g = parseInt(hex.substring(2, 4), 16);
            const b = parseInt(hex.substring(4, 6), 16);
            const newR = Math.min(255, Math.floor(r + (255 - r) * (percent / 100)));
            const newG = Math.min(255, Math.floor(g + (255 - g) * (percent / 100)));
            const newB = Math.min(255, Math.floor(b + (255 - b) * (percent / 100)));
            return `#${newR.toString(16).padStart(2, '0')}${newG.toString(16).padStart(2, '0')}${newB.toString(16).padStart(2, '0')}`;
        }

        // --- Drawing Function (for a single canvas) ---
        function drawOnCanvas(canvas, font) {
            const ctx = canvas.getContext('2d');

            // Clear canvas and set background
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'black';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            if (!font) return;

            // Get user settings
            const text = textInput.value;
            const color = colorPicker.value;
            const fontSize = parseInt(fontSizeInput.value, 10);
            const tubeWidth = parseInt(lineWidthInput.value, 10);

            // Get the vector path from opentype.js
            const path = font.getPath(text, 0, 0, fontSize);
            const boundingBox = path.getBoundingBox();
            const pathWidth = boundingBox.x2 - boundingBox.x1;
            const pathHeight = boundingBox.y2 - boundingBox.y1;

            const x = (canvas.width - pathWidth) / 2 - boundingBox.x1;
            const y = (canvas.height - pathHeight) / 2 - boundingBox.y1;
            
            const centeredPath = font.getPath(text, x, y, fontSize);
            
            ctx.beginPath();
            centeredPath.draw(ctx);

            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';

            // 1. Outer Glow
            ctx.strokeStyle = color;
            ctx.lineWidth = tubeWidth + 4;
            ctx.shadowColor = color;
            ctx.shadowBlur = 30;
            ctx.stroke();

            // 2. Middle Glow
            ctx.lineWidth = tubeWidth;
            ctx.shadowBlur = 15;
            ctx.stroke();

            // 3. Inner "tube" color
            ctx.strokeStyle = lightenColor(color, 80);
            ctx.lineWidth = Math.max(1, tubeWidth / 2.5);
            ctx.shadowBlur = 0;
            ctx.stroke();

            ctx.shadowColor = 'transparent';
        }

        // --- Generate all previews ---
        function generatePreviews() {
            previewsContainer.innerHTML = ''; // Clear existing previews

            if (loadedFonts.length === 0) {
                previewsContainer.innerHTML = '<p id="initial-message">Upload one or more font files to see the previews.</p>';
                return;
            }

            for (const fontData of loadedFonts) {
                // Create wrapper
                const wrapper = document.createElement('div');
                wrapper.className = 'preview-wrapper';

                // Create title
                const title = document.createElement('h3');
                title.textContent = fontData.name;
                wrapper.appendChild(title);

                // Create canvas
                const canvas = document.createElement('canvas');
                canvas.width = CANVAS_WIDTH;
                canvas.height = CANVAS_HEIGHT;
                const aspectRatio = CANVAS_HEIGHT / CANVAS_WIDTH;
                canvas.style.width = '400px';
                canvas.style.height = `${400 * aspectRatio}px`;
                wrapper.appendChild(canvas);

                // Create download button
                const downloadBtn = document.createElement('button');
                downloadBtn.textContent = 'Download Wallpaper';
                downloadBtn.addEventListener('click', () => {
                    const link = document.createElement('a');
                    link.download = `${textInput.value}_${fontData.name}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                });
                wrapper.appendChild(downloadBtn);

                previewsContainer.appendChild(wrapper);

                // Draw on the newly created canvas
                drawOnCanvas(canvas, fontData.font);
            }
        }

        // --- Event Listeners ---
        const redrawAll = () => generatePreviews();
        textInput.addEventListener('input', redrawAll);
        colorPicker.addEventListener('input', redrawAll);
        fontSizeInput.addEventListener('input', redrawAll);
        lineWidthInput.addEventListener('input', redrawAll);

        fontFileInput.addEventListener('change', (event) => {
            const files = event.target.files;
            if (!files.length) {
                loadedFonts = [];
                generatePreviews();
                return;
            }

            const fontPromises = Array.from(files).map(file => {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        try {
                            const font = opentype.parse(e.target.result);
                            resolve({ name: file.name, font: font });
                        } catch (err) {
                            console.error(`Failed to parse ${file.name}:`, err);
                            reject(`Could not parse ${file.name}.`);
                        }
                    };
                    reader.onerror = () => reject(`Error reading ${file.name}.`);
                    reader.readAsArrayBuffer(file);
                });
            });

            previewsContainer.innerHTML = '<p id="initial-message">Loading fonts...</p>';

            Promise.all(fontPromises)
                .then(fonts => {
                    loadedFonts = fonts;
                    generatePreviews();
                })
                .catch(error => {
                    alert(`An error occurred: ${error}`);
                    loadedFonts = [];
                    generatePreviews();
                });
        });

    </script>
</body>
</html>
